services:
  postgres:
    image: timescale/timescaledb:2.25.1-pg16
    container_name: telemetry-postgres
    environment:
      POSTGRES_USER: telemetry
      POSTGRES_PASSWORD: telemetry
      POSTGRES_DB: telemetry_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d telemetry_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: telemetry-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://telemetry:telemetry@postgres:5432/telemetry_db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: telemetry-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_SERVER_URL: http://backend:8000
    depends_on:
      - backend

  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    container_name: telemetry-simulator
    ports:
      - "8001:8001"
    environment:
      BACKEND_URL: http://backend:8000
      VEHICLE_CONFIG_PATH: simulators/drogonsat.yaml
    depends_on:
      - backend

  simulator2:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    container_name: telemetry-simulator-2
    ports:
      - "8002:8001"
    environment:
      BACKEND_URL: http://backend:8000
      VEHICLE_CONFIG_PATH: simulators/rhaegalsat.json
    depends_on:
      - backend

  satnogs-adapter:
    build:
      context: .
      dockerfile: satnogs_adapter/Dockerfile
    container_name: telemetry-satnogs-adapter
    environment:
      SATNOGS_API_TOKEN: ${SATNOGS_API_TOKEN:-}
    depends_on:
      - backend

volumes:
  postgres_data:
